<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="688" cy="177" r="25" fill="#1d4ed8" opacity="0.09"/>
    <circle cx="49" cy="686" r="31" fill="#1d4ed8" opacity="0.11"/>
    <circle cx="289" cy="638" r="45" fill="#1d4ed8" opacity="0.10"/>
    <circle cx="1285" cy="16" r="89" fill="#1d4ed8" opacity="0.14"/>
    <circle cx="-10" cy="-81" r="75" fill="#1d4ed8" opacity="0.07"/>
    <circle cx="-88" cy="675" r="41" fill="#1d4ed8" opacity="0.16"/>
    <rect x="1235" y="-85" width="36" height="22" rx="8" fill="#2563eb" opacity="0.04" transform="rotate(29, 1257, 691)"/>
    <rect x="580" y="172" width="84" height="78" rx="8" fill="#2563eb" opacity="0.12" transform="rotate(32, 974, -57)"/>
    <rect x="1225" y="642" width="91" height="66" rx="8" fill="#2563eb" opacity="0.08" transform="rotate(44, 80, 228)"/>
    <rect x="664" y="-83" width="53" height="77" rx="8" fill="#2563eb" opacity="0.07" transform="rotate(9, 529, 127)"/>
    <rect x="284" y="559" width="97" height="22" rx="8" fill="#2563eb" opacity="0.14" transform="rotate(1, 767, 471)"/>
    <rect x="762" y="240" width="68" height="45" rx="8" fill="#2563eb" opacity="0.10" transform="rotate(0, -85, 328)"/>
    <rect x="500" y="349" width="55" height="72" rx="8" fill="#2563eb" opacity="0.07" transform="rotate(16, 875, 695)"/>
    <rect x="296" y="338" width="38" height="35" rx="8" fill="#2563eb" opacity="0.07" transform="rotate(44, 1053, 24)"/>
    <polygon points="276,-125 332,-13 220,-13" fill="#1d4ed8" opacity="0.05"/>
    <polygon points="1231,440 1273,524 1189,524" fill="#1d4ed8" opacity="0.06"/>
    <polygon points="888,73 944,185 832,185" fill="#1d4ed8" opacity="0.04"/>
    <polygon points="603,546 676,692 530,692" fill="#1d4ed8" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,566 C360,598 840,534 1200,566 L1200,630 L0,630Z" fill="#1d4ed8" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 봇 정밀 검진 및 크롤 버짓 밀착 간호
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
     — 크롤러 케어
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f59e0b" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
     구글 봇 정밀 검진 및 크롤 버짓 밀착 간호 — 크롤러 케어
  </text>
</svg>